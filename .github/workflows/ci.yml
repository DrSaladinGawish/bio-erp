name: CI — IncentiveHouse ERP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run health check
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/erp_test
          SECRET_KEY: ci-test-key
          ENVIRONMENT: testing
        run: python scripts/health_check.py

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/erp_test
        run: alembic upgrade head || echo "No alembic configured"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/erp_test
          SECRET_KEY: ci-test-key
          ENVIRONMENT: testing
        run: pytest tests/ -v --tb=short

      - name: Build Docker image
        run: docker build -t incentivehouse-erp:test .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check app/ --output-format=github
      - run: ruff format app/ --check
