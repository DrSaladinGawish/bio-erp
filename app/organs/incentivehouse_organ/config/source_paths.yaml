# config/source_paths.yaml
# Source file registry for the IncentiveHouse ERP Protocell pipeline.
# Paths are relative to the BIO_ERP project root (d:\ERP System\BIO_ERP).
# On other machines (e.g. when the F: drive is mounted), override via env var
# IH_SOURCES_OVERRIDE=<abs_path> — handled by the loader endpoint.
sources:
  Bnk:
    path: "app/organs/incentivehouse_organ/Bnk_TRNX SOURCE.xlsx"
    sheet: "Bnk_Stat_Trnx_Reg"
    description: "Bank statement transaction register (2,501 rows, 2026 fiscal year)"
    header_row: 0
  BnkGL:
    path: "app/organs/incentivehouse_organ/Bnk_TRNX SOURCE.xlsx"
    sheet: "Bnk_Stat_Trnx_GL"
    description: "Bank statement GL leg (5,002 rows, dual-entry Dr/Cr)"
    header_row: 0
  Sal:
    path: "app/organs/incentivehouse_organ/EINV_SAL_TRNX SOURCE.xlsx"
    sheet: null
    description: "E-invoice sales transactions"
    header_row: 0
  Pur:
    path: "app/organs/incentivehouse_organ/EINV_PUR_TRNX SOURCE.xlsx"
    sheet: null
    description: "E-invoice purchase transactions"
    header_row: 0
  GL:
    path: "app/organs/incentivehouse_organ/GL_TRNX SOURCE.xlsx"
    sheet: null
    description: "General ledger transactions (split to Evn/Env)"
    header_row: 0
  ChqBook:
    path: "app/organs/incentivehouse_organ/Chq_Book_Mtb.xlsx"
    sheet: null
    description: "Cheque book master table"
    header_row: 0
  Clients:
    path: "app/organs/incentivehouse_organ/Clients_Mtbl.xlsx"
    sheet: null
    description: "Clients master table"
    header_row: 0
  SubLedKey:
    path: "app/organs/incentivehouse_organ/Sub_Led_Data_Base.xlsx"
    sheet: null
    description: "Sub-ledger data base (master for sub-ledger keys)"
    header_row: 0
  DataBaseM:
    path: "app/organs/incentivehouse_organ/Data_Base_Mtbls.xlsx"
    sheet: null
    description: "Master tables: clients, sub-ledger, cost-centre, trnx-id, cheque-book"
    header_row: 0

# Mapping from module key to source keys (a module can pull from many files)
module_groups:
  Bnk:
    - Bnk
    - BnkGL
  Sal:
    - Sal
  Pur:
    - Pur
  GL:
    - GL

# Order in which modules are processed by /extract/all
all_modules:
  - Bnk
  - Sal
  - Pur
