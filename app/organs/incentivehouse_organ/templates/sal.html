{% extends "base.html" %}
{% block title %}Sales - IncentiveHouse ERP{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Dashboard</a> &raquo; Sales</div>
<div class="page-header">
    <h1>Sales Invoices</h1>
    <div class="actions">
        <a href="/api/v1/incentivehouse/events/new" class="btn btn-success">+ New Invoice</a>
        <button class="btn btn-ghost" onclick="refreshList()">Refresh</button>
    </div>
</div>
<div class="kpi-grid">
    <div class="kpi-card kpi-revenue"><div class="kpi-label">Total Revenue</div><div class="kpi-value" id="kpiRevenue">-</div></div>
    <div class="kpi-card kpi-active"><div class="kpi-label">Invoices</div><div class="kpi-value" id="kpiCount">-</div></div>
    <div class="kpi-card kpi-pending"><div class="kpi-label">Pending</div><div class="kpi-value" id="kpiPending">-</div></div>
</div>
<div class="content-card">
    <div id="invoiceList" style="text-align:center;padding:40px;color:#888">Loading...</div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
async function refreshList(){
    var el = document.getElementById('invoiceList');
    try {
        var r = await fetch('/api/v1/sal/invoices?page=1&page_size=50');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        var data = await r.json();
        var items = data.items || data.results || data || [];
        if (!items.length) { el.innerHTML = '<p>No invoices found.</p>'; return; }
        var html = '<table class="data-table"><thead><tr><th>Invoice #</th><th>Client</th><th>Date</th><th>Subtotal</th><th>Tax</th><th>Total</th><th>Status</th></tr></thead><tbody>';
        var tot=0, pending=0;
        items.forEach(function(it){
            var amt = parseFloat(it.total_amount || it.grand_total || 0) || 0;
            tot += amt;
            if ((it.status||'PENDING') === 'PENDING') pending++;
            html += '<tr><td><code>' + (it.invoice_number||it.id||'-') + '</code></td>'
                  + '<td>' + (it.client_id||it.client_name||'-') + '</td>'
                  + '<td>' + (it.invoice_date||it.created_at||'-') + '</td>'
                  + '<td>' + (parseFloat(it.subtotal||0)).toFixed(2) + '</td>'
                  + '<td>' + (parseFloat(it.tax_amount||0)).toFixed(2) + '</td>'
                  + '<td><strong>' + amt.toFixed(2) + '</strong></td>'
                  + '<td><span class="badge">' + (it.status||'PENDING') + '</span></td></tr>';
        });
        html += '</tbody></table>';
        el.innerHTML = html;
        document.getElementById('kpiRevenue').textContent = tot.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
        document.getElementById('kpiCount').textContent = items.length;
        document.getElementById('kpiPending').textContent = pending;
    } catch(e) {
        el.innerHTML = '<p style="color:#c00">Could not load invoices: ' + e.message + '</p>';
    }
}
refreshList();
</script>
{% endblock %}
