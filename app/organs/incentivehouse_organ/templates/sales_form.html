{% extends "base.html" %}
{% block title %}New Sales Invoice - IncentiveHouse ERP{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Dashboard</a> &raquo; <a href="/sal">Sales</a> &raquo; New Invoice</div>
<div class="page-header">
    <h1>New Sales Invoice</h1>
    <div class="actions">
        <a href="/sal" class="btn btn-ghost">Cancel</a>
    </div>
</div>
<form id="salesForm" class="content-card">
    <div class="alert" id="formAlert" style="display:none"></div>
    <div class="form-row">
        <div class="form-group">
            <label for="invoice_number">Invoice Number *</label>
            <input type="text" id="invoice_number" name="invoice_number" required placeholder="INV-2024-001">
        </div>
        <div class="form-group">
            <label for="client_id">Client *</label>
            <input type="number" id="client_id" name="client_id" required min="1" placeholder="1">
        </div>
        <div class="form-group">
            <label for="pnr_id">PNR Reference</label>
            <input type="number" id="pnr_id" name="pnr_id" min="0" placeholder="Optional">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="invoice_date">Invoice Date *</label>
            <input type="date" id="invoice_date" name="invoice_date" required>
        </div>
        <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date" id="due_date" name="due_date">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="subtotal">Subtotal (EGP) *</label>
            <input type="number" id="subtotal" name="subtotal" required min="0" step="0.01" value="0" oninput="recalc()">
        </div>
        <div class="form-group">
            <label for="tax_amount">Tax (EGP)</label>
            <input type="number" id="tax_amount" name="tax_amount" min="0" step="0.01" value="0" oninput="recalc()">
        </div>
        <div class="form-group">
            <label for="total_amount">Total (EGP)</label>
            <input type="number" id="total_amount" name="total_amount" readonly value="0" style="background:#f0f2f5">
        </div>
    </div>
    <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="window.location='/sal'">Cancel</button>
        <button type="submit" class="btn btn-success">Save Invoice</button>
    </div>
</form>
{% endblock %}
{% block extra_scripts %}
<script>
function recalc() {
    var sub = parseFloat(document.getElementById('subtotal').value) || 0;
    var tax = parseFloat(document.getElementById('tax_amount').value) || 0;
    document.getElementById('total_amount').value = (sub + tax).toFixed(2);
}
document.getElementById('salesForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var alert = document.getElementById('formAlert');
    alert.style.display = 'none';
    var data = {
        invoice_number: document.getElementById('invoice_number').value,
        client_id: parseInt(document.getElementById('client_id').value),
        pnr_id: parseInt(document.getElementById('pnr_id').value) || null,
        invoice_date: document.getElementById('invoice_date').value,
        due_date: document.getElementById('due_date').value || null,
        subtotal: parseFloat(document.getElementById('subtotal').value) || 0,
        tax_amount: parseFloat(document.getElementById('tax_amount').value) || 0,
        total_amount: parseFloat(document.getElementById('total_amount').value) || 0,
    };
    try {
        var r = await fetch('/api/v1/sal/invoices', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if (r.ok) {
            alert.className = 'alert alert-success';
            alert.textContent = 'Invoice created!';
            alert.style.display = 'block';
            setTimeout(function(){ window.location = '/sal'; }, 1000);
        } else {
            var err = await r.json().catch(function(){return {detail:'Error'};});
            alert.className = 'alert alert-error';
            alert.textContent = 'Error: ' + (err.detail || r.status);
            alert.style.display = 'block';
        }
    } catch (e) {
        alert.className = 'alert alert-error';
        alert.textContent = 'Network error: ' + e.message;
        alert.style.display = 'block';
    }
});
</script>
{% endblock %}
