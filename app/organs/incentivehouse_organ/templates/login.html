<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - IncentiveHouse ERP</title>
<link rel="icon" type="image/jpeg" href="/static/img/logosmal.jpg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a3a5c 0%, #2d8a8a 100%);
    color: #333;
    padding: 20px;
}
.login-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    max-width: 420px;
    width: 100%;
}
.login-header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2d8a8a 100%);
    color: #fff;
    padding: 30px;
    text-align: center;
    position: relative;
}
.login-header img { height: 70px; margin-bottom: 12px; }
.login-header h1 { font-size: 22px; letter-spacing: 2px; margin-bottom: 4px; }
.login-header p { font-size: 13px; opacity: 0.85; letter-spacing: 1px; }
.login-body { padding: 30px; }
.login-body label {
    display: block; font-size: 12px; font-weight: 600;
    color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
}
.login-body input {
    width: 100%; padding: 11px 14px; border: 1px solid #ddd;
    border-radius: 6px; font-size: 14px; margin-bottom: 16px; font-family: inherit;
}
.login-body input:focus { outline: none; border-color: #2d8a8a; box-shadow: 0 0 0 3px rgba(45,138,138,0.15); }
.login-body button {
    width: 100%; padding: 12px; background: #1a3a5c; color: #fff;
    border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.login-body button:hover { background: #2d5a8c; }
.login-error { color: #c0392b; font-size: 12px; margin-top: 10px; text-align: center; min-height: 16px; }
.login-footer { background: #f5f5f5; padding: 12px; text-align: center; font-size: 11px; color: #888; }
.login-footer img { height: 30px; opacity: 0.6; }
</style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <img src="/static/img/logos.jpg" alt="IncentiveHouse" onerror="this.style.display='none'">
        <h1>INCENTIVE HOUSE</h1>
        <p>ERP SYSTEM</p>
    </div>
    <div class="login-body">
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" value="admin">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" value="">
            <button type="submit" id="loginBtn">Sign in</button>
        </form>
        <div class="login-error" id="loginError"></div>
    </div>
    <div class="login-footer">
        <img src="/static/img/fotter.jpg" alt="" onerror="this.style.display='none'">
        <div>IncentiveHouse ERP v2.3.0 &middot; &copy; 2026</div>
    </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('loginBtn');
    var err = document.getElementById('loginError');
    err.textContent = '';
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
        var r = await fetch('/api/v1/incentivehouse/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        var data = await r.json();
        if (r.ok && data.access_token) {
            try { localStorage.setItem('ihe_token', data.access_token); } catch (e) {}
            window.location.href = '/';
        } else {
            err.textContent = data.detail || 'Login failed.';
        }
    } catch (e) {
        err.textContent = 'Cannot reach server.';
    } finally {
        btn.disabled = false; btn.textContent = 'Sign in';
    }
});
</script>
</body>
</html>
