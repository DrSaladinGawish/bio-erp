{% extends "base.html" %}
{% block title %}Purchases - IncentiveHouse ERP{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Dashboard</a> &raquo; Purchases</div>
<div class="page-header">
    <h1>Purchase Vouchers</h1>
    <div class="actions">
        <a href="/api/v1/incentivehouse/purchasing" class="btn btn-success">+ New Voucher</a>
        <button class="btn btn-ghost" onclick="refreshList()">Refresh</button>
    </div>
</div>
<div class="kpi-grid">
    <div class="kpi-card kpi-expense"><div class="kpi-label">Total Spend</div><div class="kpi-value" id="kpiSpend">-</div></div>
    <div class="kpi-card kpi-active"><div class="kpi-label">Vouchers</div><div class="kpi-value" id="kpiCount">-</div></div>
    <div class="kpi-card kpi-pending"><div class="kpi-label">Pending Approval</div><div class="kpi-value" id="kpiPending">-</div></div>
</div>
<div class="content-card">
    <div id="purList" style="text-align:center;padding:40px;color:#888">Loading...</div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
async function refreshList(){
    var el = document.getElementById('purList');
    try {
        var r = await fetch('/api/v1/pur/vouchers?page=1&page_size=50');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        var data = await r.json();
        var items = data.items || data.results || data || [];
        if (!items.length) { el.innerHTML = '<p>No purchase vouchers found.</p>'; return; }
        var html = '<table class="data-table"><thead><tr><th>Date</th><th>Voucher #</th><th>Vendor</th><th>Total</th><th>Status</th></tr></thead><tbody>';
        var tot=0, pending=0;
        items.forEach(function(it){
            var amt = parseFloat(it.total_amount || it.grand_total || 0) || 0;
            tot += amt;
            if ((it.status||'PENDING') === 'PENDING') pending++;
            html += '<tr><td>' + (it.voucher_date||it.date||'-') + '</td>'
                  + '<td><code>' + (it.voucher_number||it.id||'-') + '</code></td>'
                  + '<td>' + (it.vendor_id||it.vendor_name||'-') + '</td>'
                  + '<td><strong>' + amt.toFixed(2) + '</strong></td>'
                  + '<td>' + (it.status||'PENDING') + '</td></tr>';
        });
        html += '</tbody></table>';
        el.innerHTML = html;
        document.getElementById('kpiSpend').textContent = tot.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
        document.getElementById('kpiCount').textContent = items.length;
        document.getElementById('kpiPending').textContent = pending;
    } catch(e) {
        el.innerHTML = '<p style="color:#c00">Could not load: ' + e.message + '</p>';
    }
}
refreshList();
</script>
{% endblock %}
