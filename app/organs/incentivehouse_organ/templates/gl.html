{% extends "base.html" %}
{% block title %}General Ledger - IncentiveHouse ERP{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Dashboard</a> &raquo; General Ledger</div>
<div class="page-header">
    <h1>General Ledger - Journal Vouchers</h1>
    <div class="actions">
        <button class="btn btn-success" onclick="alert('Use the GL module in the API to create vouchers')">+ New Voucher</button>
        <button class="btn btn-ghost" onclick="refreshList()">Refresh</button>
    </div>
</div>
<div class="kpi-grid">
    <div class="kpi-card kpi-active"><div class="kpi-label">Vouchers</div><div class="kpi-value" id="kpiCount">-</div></div>
    <div class="kpi-card kpi-revenue"><div class="kpi-label">Total Debits</div><div class="kpi-value" id="kpiDebit">-</div></div>
    <div class="kpi-card kpi-expense"><div class="kpi-label">Total Credits</div><div class="kpi-value" id="kpiCredit">-</div></div>
</div>
<div class="content-card">
    <div id="glList" style="text-align:center;padding:40px;color:#888">Loading...</div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
async function refreshList(){
    var el = document.getElementById('glList');
    try {
        var r = await fetch('/api/gl/vouchers?page=1&page_size=50');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        var data = await r.json();
        var items = data.items || data.results || data || [];
        if (!items.length) { el.innerHTML = '<p>No GL vouchers yet.</p>'; return; }
        var html = '<table class="data-table"><thead><tr><th>Date</th><th>Voucher #</th><th>Narration</th><th>Debit</th><th>Credit</th><th>Status</th></tr></thead><tbody>';
        var dr=0, cr=0;
        items.forEach(function(it){
            dr += parseFloat(it.total_debit||0) || 0;
            cr += parseFloat(it.total_credit||0) || 0;
            html += '<tr><td>' + (it.voucher_date||it.date||'-') + '</td>'
                  + '<td><code>' + (it.voucher_number||it.id||'-') + '</code></td>'
                  + '<td>' + (it.narration||it.description||'-') + '</td>'
                  + '<td>' + (parseFloat(it.total_debit||0)).toFixed(2) + '</td>'
                  + '<td>' + (parseFloat(it.total_credit||0)).toFixed(2) + '</td>'
                  + '<td>' + (it.status||'POSTED') + '</td></tr>';
        });
        html += '</tbody></table>';
        el.innerHTML = html;
        document.getElementById('kpiCount').textContent = items.length;
        document.getElementById('kpiDebit').textContent = dr.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
        document.getElementById('kpiCredit').textContent = cr.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    } catch(e) {
        el.innerHTML = '<p style="color:#c00">Could not load GL: ' + e.message + '</p>';
    }
}
refreshList();
</script>
{% endblock %}
