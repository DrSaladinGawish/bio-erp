version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bio_erp}
      POSTGRES_USER: ${POSTGRES_USER:-bio_erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bio_erp_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bio_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bio_erp}:${POSTGRES_PASSWORD:-bio_erp_secret}@db:5432/${POSTGRES_DB:-bio_erp}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bio-erp.local}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-System Admin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - report_data:/tmp/bio_erp_reports

  celery-worker:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bio_erp}:${POSTGRES_PASSWORD:-bio_erp_secret}@db:5432/${POSTGRES_DB:-bio_erp}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - report_data:/tmp/bio_erp_reports
    command: celery -A app.celery_app worker -l info -Q default,reports,or_engines

  celery-beat:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bio_erp}:${POSTGRES_PASSWORD:-bio_erp_secret}@db:5432/${POSTGRES_DB:-bio_erp}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    command: celery -A app.celery_app beat -l info

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
  report_data: